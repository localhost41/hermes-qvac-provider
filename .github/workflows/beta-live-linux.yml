name: Beta live Linux

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      confirm_model_download:
        description: Type I_ACCEPT_QVAC_MODEL_DOWNLOAD to run physical inference
        required: true
        type: string

permissions:
  contents: read

jobs:
  live-qvac:
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.confirm_model_download == 'I_ACCEPT_QVAC_MODEL_DOWNLOAD') ||
      (github.event_name == 'pull_request' && github.event.label.name == 'beta-live-approved')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Record host capacity
        run: |
          uname -a
          uname -m
          df -h /
          free -h
      - name: Install supported Hermes release
        run: |
          git clone --depth 1 --branch v2026.7.20 https://github.com/NousResearch/hermes-agent.git "$RUNNER_TEMP/hermes-agent"
          python -m pip install "$RUNNER_TEMP/hermes-agent"
      - name: Install candidate
        run: pnpm install --frozen-lockfile
      - name: Run real Hermes to QVAC inference
        env:
          HERMES_HOME: ${{ runner.temp }}/hermes-home
        run: |
          pnpm build
          node dist/cli.js setup --json
          node dist/cli.js smoke \
            --model qwen3.5-0.8b \
            --aux-model qwen3.5-0.8b \
            --ctx-size 32768 \
            --reasoning-budget 0 \
            --no-tools \
            --no-reuse \
            --ready-timeout-ms 900000 \
            --timeout-seconds 180 \
            --yes \
            --json
      - name: Verify cleanup
        if: always()
        env:
          HERMES_HOME: ${{ runner.temp }}/hermes-home
        run: |
          node dist/cli.js status --json || true
          if pgrep -af '[q]vac serve openai'; then
            echo 'QVAC process remained after live smoke' >&2
            exit 1
          fi
