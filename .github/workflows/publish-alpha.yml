name: Publish Alpha

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref or tag to publish
        required: true
        default: main

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ inputs.ref }}
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install npm with trusted publishing support
        run: npm install --global npm@11
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify alpha package
        run: |
          node -e "const p=require('./package.json'); if (!/-alpha\\./.test(p.version)) throw new Error('Refusing to publish non-alpha version ' + p.version);"
          pnpm lint
          pnpm test
          pnpm test:python
          pnpm build
          pnpm verify:package
      - name: Publish alpha
        run: npm publish --access public --tag alpha --provenance
