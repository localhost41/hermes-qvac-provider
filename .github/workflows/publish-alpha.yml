name: Publish Prerelease

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref or tag to publish
        required: true
        default: main

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ inputs.ref }}
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install npm with trusted publishing support
        run: npm install --global npm@11
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Resolve prerelease channel
        id: prerelease
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const { version } = require('./package.json')
          const match = version.match(/-(alpha|beta)\.\d+$/)
          if (!match) {
            throw new Error(`Refusing to publish non-alpha/beta version ${version}`)
          }
          console.log(`dist_tag=${match[1]}`)
          NODE
      - name: Verify prerelease package
        run: |
          pnpm lint
          pnpm test
          pnpm test:python
          pnpm build
          pnpm verify:package
          pnpm audit --prod --audit-level high
      - name: Publish prerelease
        run: npm publish --access public --tag "${{ steps.prerelease.outputs.dist_tag }}" --provenance
